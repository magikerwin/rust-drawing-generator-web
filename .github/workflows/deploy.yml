name: Deploy WebAssembly to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab (e.g., after uploading new model weights)

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WebAssembly Module
        run: |
          wasm-pack build web --target web --out-dir ../docs/pkg

      # Remove .gitignore to prevent deployment filter exclusions.
      # Workaround for peaceiris/actions-gh-pages ignoring folders (like /docs/pkg/) that are in the master .gitignore.
      # Reference: https://github.com/peaceiris/actions-gh-pages/issues/445
      - name: Remove .gitignore to prevent deployment filter exclusions
        run: rm -f .gitignore

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
