name: Deploy WebAssembly to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab (e.g., after uploading new model weights)

permissions:
  contents: read    # Only need to read the source — no longer pushing to gh-pages
  pages: write      # Required to deploy to GitHub Pages via the API
  id-token: write   # Required for OIDC authentication with the Pages API

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WebAssembly Module
        run: |
          wasm-pack build web --target web --out-dir ../docs/pkg

      - name: Download Model Weights from GitHub Releases
        run: |
          VERSION=$(cat docs/weights-version.txt | xargs)
          echo "Downloading version $VERSION weights..."
          
          # Attempt to download weights (do not fail the step on missing files)
          curl -L -o docs/mnist-model.bin "https://github.com/magikerwin/burn-drawing-generator-web/releases/download/$VERSION/mnist-model.bin" || true
          curl -L -o docs/quickdraw-model.bin "https://github.com/magikerwin/burn-drawing-generator-web/releases/download/$VERSION/quickdraw-model.bin" || true
          curl -L -o docs/emnist-model.bin "https://github.com/magikerwin/burn-drawing-generator-web/releases/download/$VERSION/emnist-model.bin" || true
          
          # If any weight file is missing or contains GitHub's 404 HTML page, replace it with an empty placeholder
          for file in mnist-model.bin quickdraw-model.bin emnist-model.bin; do
            if [ ! -f "docs/$file" ] || grep -q "<html" "docs/$file" 2>/dev/null; then
              echo "Weights file docs/$file is not available in release. Creating local empty placeholder."
              echo -n "" > "docs/$file"
            fi
          done

      - name: Assert required files exist
        run: |
          echo "Checking build output..."
          test -f docs/index.html             || (echo "MISSING: docs/index.html" && exit 1)
          test -f docs/pkg/mnist_web.js       || (echo "MISSING: docs/pkg/mnist_web.js" && exit 1)
          test -f docs/pkg/mnist_web_bg.wasm  || (echo "MISSING: docs/pkg/mnist_web_bg.wasm" && exit 1)
          test -f docs/mnist-model.bin        || (echo "MISSING: docs/mnist-model.bin" && exit 1)
          test -f docs/quickdraw-model.bin    || (echo "MISSING: docs/quickdraw-model.bin" && exit 1)
          test -f docs/emnist-model.bin       || (echo "MISSING: docs/emnist-model.bin" && exit 1)
          echo "All required files present. Proceeding with deployment."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # upload-pages-artifact zips docs/ as-is, ignoring .gitignore entirely.
      # This means docs/pkg/ (including the WASM binary) is always included,
      # with no workarounds needed for gitignore filtering.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    runs-on: ubuntu-latest
    needs: build  # Only runs after build succeeds
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live deployment
        run: |
          echo "Waiting 60s for GitHub Pages CDN to propagate..."
          sleep 60
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://magikerwin.github.io/burn-drawing-generator-web/pkg/mnist_web_bg.wasm)
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: WASM file returned HTTP $STATUS — deployment may be broken!"
            exit 1
          fi
          echo "OK: WASM file is live (HTTP $STATUS)"
