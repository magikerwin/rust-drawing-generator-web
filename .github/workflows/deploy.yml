name: Deploy WebAssembly to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab (e.g., after uploading new model weights)

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WebAssembly Module
        run: |
          wasm-pack build web --target web --out-dir ../docs/pkg

      - name: Assert required files exist
        run: |
          echo "Checking build output..."
          test -f docs/index.html             || (echo "MISSING: docs/index.html" && exit 1)
          test -f docs/pkg/mnist_web.js       || (echo "MISSING: docs/pkg/mnist_web.js" && exit 1)
          test -f docs/pkg/mnist_web_bg.wasm  || (echo "MISSING: docs/pkg/mnist_web_bg.wasm" && exit 1)
          echo "All required files present. Proceeding with deployment."

      # Deploy docs/ directly to gh-pages branch via git instead of using peaceiris/actions-gh-pages.
      # Two reasons:
      #   1. peaceiris/actions-gh-pages internally respects .gitignore, filtering out docs/pkg/
      #      (which is gitignored in master to avoid committing build artifacts).
      #   2. wasm-pack auto-generates a .gitignore inside docs/pkg/, which blocks `git add`
      #      even with -f, so we explicitly delete it before staging.
      # Reference: https://github.com/peaceiris/actions-gh-pages/issues/445
      - name: Deploy to GitHub Pages
        run: |
          set -euo pipefail
          # Remove any .gitignore files inside docs/ so they don't block git add
          find docs -name ".gitignore" -delete

          # Save the built docs/ into a temp dir before switching branches
          cp -r docs /tmp/gh-pages-content

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Wipe everything in the branch
          git rm -rf . --quiet || true

          # Copy docs/ *contents* (not the folder itself) to the branch root
          cp -r /tmp/gh-pages-content/. .

          echo "=== Files to be committed ==="
          find . -not -path './.git/*' | sort

          git add -f .
          git commit -m "Deploy to gh-pages [skip ci]" || echo "Nothing to commit"
          git push origin gh-pages

      - name: Verify live deployment
        run: |
          echo "Waiting 60s for GitHub Pages CDN to propagate..."
          sleep 60
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://magikerwin.github.io/rust-burn-classifier-web/pkg/mnist_web_bg.wasm)
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: WASM file returned HTTP $STATUS — deployment may be broken!"
            exit 1
          fi
          echo "OK: WASM file is live (HTTP $STATUS)"
